<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysScope - System Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <el-container>
            <el-header>
                <div class="header-content">
                    <h1>SysScope</h1>
                    <span class="subtitle">System Monitor</span>
                </div>
            </el-header>
            <el-container>
                <el-aside width="200px">
                    <el-menu
                        :default-active="activeMenu"
                        @select="handleMenuSelect"
                        background-color="#001529"
                        text-color="#fff"
                        active-text-color="#1890ff">
                        <el-menu-item index="dashboard">
                            <el-icon><icon-monitor /></el-icon>
                            <span>Dashboard</span>
                        </el-menu-item>
                        <el-menu-item index="cpu">
                            <el-icon><icon-cpu /></el-icon>
                            <span>CPU Monitor</span>
                        </el-menu-item>
                        <el-menu-item index="memory">
                            <el-icon><icon-memory /></el-icon>
                            <span>Memory</span>
                        </el-menu-item>
                        <el-menu-item index="process">
                            <el-icon><icon-process /></el-icon>
                            <span>Processes</span>
                        </el-menu-item>
                        <el-menu-item index="ports">
                            <el-icon><icon-port /></el-icon>
                            <span>Ports</span>
                        </el-menu-item>
                        <el-menu-item index="system">
                            <el-icon><icon-system /></el-icon>
                            <span>System Info</span>
                        </el-menu-item>
                    </el-menu>
                </el-aside>
                <el-main>
                    <div v-if="activeMenu === 'dashboard'">
                        <dashboard-view :data="dashboardData" :systemData="systemData"></dashboard-view>
                    </div>
                    <div v-if="activeMenu === 'cpu'">
                        <cpu-view :data="cpuData"></cpu-view>
                    </div>
                    <div v-if="activeMenu === 'memory'">
                        <memory-view :data="memoryData"></memory-view>
                    </div>
                    <div v-if="activeMenu === 'process'">
                        <process-view :data="processData" @refresh="fetchProcessData"></process-view>
                    </div>
                    <div v-if="activeMenu === 'ports'">
                        <ports-view :data="portsData"></ports-view>
                    </div>
                    <div v-if="activeMenu === 'system'">
                        <system-view :data="systemData"></system-view>
                    </div>
                </el-main>
            </el-container>
        </el-container>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="api/monitor.js"></script>
    <script src="components/InfoCard.js"></script>
    <script src="components/CpuChart.js"></script>
    <script src="components/MemoryChart.js"></script>
    <script src="views/Dashboard.js?v=1.0.1"></script>
    <script src="views/Cpu.js?v=1.0.1"></script>
    <script src="views/Memory.js?v=1.0.1"></script>
    <script src="views/Process.js?v=1.0.1"></script>
    <script src="views/Ports.js?v=1.0.1"></script>
    <script src="views/System.js?v=1.0.1"></script>
    <script src="app.js?v=1.0.1"></script>
</body>
</html>
